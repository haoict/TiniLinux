name: Daily refresh cache (h700)

on:
  schedule:
    - cron: '0 11 */4 * *' # every 4th day-of-month at 11AM UTC
  workflow_dispatch: {}

jobs:
  refresh-cache:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v5
        with:
          path: TiniLinux

      - name: Create board build config
        run: |
          set -x
          cd TiniLinux
          ./scripts/make-board-build.sh configs/h700_defconfig
          cd output/h700

      - name: Restore dl cache
        uses: actions/cache@v5
        with:
          path: TiniLinux/dl
          key: dl-cache-h700-${{ hashFiles('TiniLinux/output/h700/.config') }}
          restore-keys: |
            dl-cache-h700-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: TiniLinux/.buildroot-ccache
          key: ccache-h700-${{ hashFiles('TiniLinux/output/h700/.config') }}
          restore-keys: |
            ccache-h700-
