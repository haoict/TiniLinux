name: Daily refresh cache (rgb30)

on:
  schedule:
    - cron: '0 11 */4 * *' # every 4th day-of-month at 11AM UTC
  workflow_dispatch: {}

jobs:
  refresh-cache:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v5
        with:
          path: TiniLinux

      - name: Create board build config
        run: |
          set -x
          cd TiniLinux
          ./scripts/make-board-build.sh configs/rgb30_defconfig
          cd output/rgb30

      - name: Restore dl cache
        uses: actions/cache@v5
        with:
          path: TiniLinux/dl
          key: dl-cache-rgb30-${{ hashFiles('TiniLinux/output/rgb30/.config') }}
          restore-keys: |
            dl-cache-rgb30-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: TiniLinux/.buildroot-ccache
          key: ccache-rgb30-${{ hashFiles('TiniLinux/output/rgb30/.config') }}
          restore-keys: |
            ccache-rgb30-
